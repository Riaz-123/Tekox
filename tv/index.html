    <!-- Scripts -->
    <script>
        // Interactive Background Glow
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const glow = document.createElement('div');
            glow.className = 'glow-point';
            glow.style.left = e.pageX + 'px';
            glow.style.top = e.pageY + 'px';
            document.body.appendChild(glow);
            
            setTimeout(() => {
                glow.style.transition = 'opacity 0.5s ease';
                glow.style.opacity = '0';
                setTimeout(() => glow.remove(), 500);
            }, 50);
        });

        // Video Streaming Logic
        const video = document.getElementById("videoPlayer");
        const playerContainer = document.getElementById("player-container");

        document.querySelectorAll(".print").forEach(channelBtn => {
            channelBtn.addEventListener("click", () => {
                const streamUrl = channelBtn.getAttribute("data-url");

                // Scroll smoothly to video player
                playerContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // Initialize HLS.js
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play();
                    });
                } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                    // Fallback for native HLS support (Safari)
                    video.src = streamUrl;
                    video.play();
                } else {
                    alert("⚠️ Streaming Error: Your browser protocol does not support this stream format.");
                }
            });
        });
    </script>
