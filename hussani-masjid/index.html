<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Quiz - Hussaini Masjid</title>
    
    <style>
        /* =========================================
           1. CUSTOM FONTS (From GitHub/Local Folder)
           ========================================= */
        * {
    box-sizing: border-box;
}
        @font-face {
            font-family: 'CustomAmiri';
            /* Adjust this path based on your GitHub repo structure */
            src: url('../MB-Ahmed-Soomro-SK-2.0.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        @font-face {
            font-family: 'CustomNoto';
            /* Adjust this path based on your GitHub repo structure */
            src: url('../MB-Ahmed-Soomro-SK-2.0.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        /* =========================================
           2. BLACK & WHITE SCREEN DESIGN
           ========================================= */
        :root {
            --text-dark: #000000;
            --border-gray: #444444;
            --bg-light: #fdfdfd;
            --heading-font: 'CustomAmiri', serif;
            --body-font: 'CustomNoto', serif;
        }

        body {
            font-family: var(--body-font);
            background-color: #e5e5e5; /* Gray screen background */
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            font-size: 13pt;
        }

        .container {
            max-width: 210mm; /* A4 Paper Width */
            margin: auto;
            background: var(--bg-light);
            padding: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
        }

        /* Cover Page Elements */
        .cover-page {
            text-align: center;
            padding: 60px 20px;
            border: 5px double var(--text-dark);
            margin-bottom: 30px;
            page-break-after: always; /* Forces content to start on page 2 */
        }

        .cover-logo {
            max-width: 140px;
            margin-bottom: 20px;
            filter: grayscale(100%); /* Forces logo to be B&W on screen */
        }

        .masjid-name {
            font-family: var(--heading-font);
            font-size: 46px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 10px 0;
        }

        .village-name {
            font-family: var(--heading-font);
            font-size: 30px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        /* ٽائٽل جي بڪس جو مسئلو حل ڪرڻ لاءِ */
.quiz-title {
    font-family: var(--heading-font);
    font-size: 32px;
    font-weight: 700;
    color: var(--text-dark);
    border: 2px solid var(--text-dark);
    /* هيٺان کان وڌيڪ پيڊنگ ڏني وئي آهي ته جيئن اکر نه ڪٽجن */
    padding: 15px 40px 25px 40px; 
    line-height: 1.5;
    display: inline-block;
    margin-top: 15px;
}

/* آپشنز جي بڪسن جو مسئلو حل ڪرڻ لاءِ */
.option {
    /* مٿان 8px، ساڄي 12px، هيٺان 18px (سنڌي اکرن لاءِ)، کاٻي 12px */
    padding: 8px 12px 18px 12px; 
    border: 1px solid #555; /* بارڊر کي ٿورو واضح ڪيو ويو آهي */
    border-radius: 4px;
    font-size: 15px;
    line-height: 1.5;
    /* Flexbox استعمال ڪيو آهي ته جيئن ٽيڪسٽ بڪس جي بلڪل وچ تي رهي */
    display: flex;
    align-items: center; 
}

/* نالو لکڻ واري ليڪ لاءِ نئين ڊيزائين */
.student-name-container {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-top: 40px;
    gap: 10px;
}

.name-line {
    display: inline-block;
    width: 300px;
    border-bottom: 2px solid #000; /* هي هڪ ئي صاف ليڪ ٺاهيندو */
    height: 10px; 
}

        /* Two-Column Grid Setup */
        #quiz-container {
            column-count: 2;
            column-gap: 35px;
            column-rule: 1px dashed var(--border-gray);
        }

        .mcq-box {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #aaa;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .question {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 20px; /* هن کي 10px مان وڌائي 20px ڪيو ويو آهي ته جيئن فاصلو ٿئي */
    line-height: 1.6; /* سنڌي اکرن کي مٿان کان صاف رکڻ لاءِ */
}

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        
        .answer {
            margin-top: 12px;
            font-size: 15px;
            font-weight: bold;
            color: var(--text-dark);
            border-top: 1px dashed #ccc;
            padding-top: 5px;
        }

        /* Footer */
        .footer-credit {
            text-align: center;
            font-family: var(--body-font);
            font-size: 12px;
            margin-top: 40px;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        /* Action Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            background: #fff;
            color: #000;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            border: 2px solid #000;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: #000; color: #fff; }

        /* Utility class to hide answers */
        body.hide-answers .answer { display: none !important; }

        /* =========================================
           3. STRICT BLACK & WHITE PRINT MEDIA QUERY
           ========================================= */
        @media print {
            body { background: #fff; padding: 0; margin: 0; }
            .container { box-shadow: none; border: none; padding: 0; max-width: 100%; width: 100%; }
            .controls { display: none !important; } /* Hide buttons when printing */
            
            /* Force pure black ink */
            * { color: #000 !important; }
            
            .mcq-box { border-bottom: 1px solid #000; }
            .option { border: 1px solid #000; }
            .quiz-title { border: 3px solid #000; }
            #quiz-container { column-rule: 1px dashed #000; }
            .footer-credit { color: #000; border-top: 1px solid #000; }
        }
    </style>
</head>

    </div>

        </div>
        
        <div id="quiz-container">

        <div class="footer-credit">
