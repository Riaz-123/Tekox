<!DOCTYPE html>
<html>
<head>
  <title>Ramadan Pen - Air Writing</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #050301; overflow: hidden; font-family: sans-serif; }
    video { display: none; }
    canvas { width: 100vw; height: 100vh; transform: scaleX(-1); }
    
    #ui {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      color: #F5D061; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px;
    }
    button { 
      background: #F5D061; border: none; padding: 10px 20px; 
      border-radius: 5px; cursor: pointer; font-weight: bold; 
    }
  </style>
</head>
<body>

  <div id="ui">
    <h2>Ramadan Pen 🌙</h2>
    <p>1. <b>Shift</b> dabaye rakhein likhne ke liye.</p>
    <p>2. <b>Space</b> dabayein screen saaf karne ke liye.</p>
    <button id="startBtn">Camera Start Karein</button>
  </div>

  <video id="vid"></video>
  <canvas id="c"></canvas>

  <script>
    const vid = document.getElementById('vid');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const startBtn = document.getElementById('startBtn');

    let lines = []; 
    let currentPath = [];
    let isShiftPressed = false;
    let isDrawing = false;
    let smoothX = null;
    let smoothY = null;

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Shift') isShiftPressed = true;
      if (e.code === 'Space') lines = [];
    });
    window.addEventListener('keyup', (e) => {
      if (e.key === 'Shift') isShiftPressed = false;
    });

    function onResults(res) {
      // Canvas size match window
      c.width = window.innerWidth;
      c.height = window.innerHeight;

      ctx.save();
      ctx.clearRect(0, 0, c.width, c.height);
      
      // Mirror effect handle karne ke liye flip
      ctx.translate(c.width, 0);
      ctx.scale(-1, 1);

      // Background video draw karein (dimmed)
      ctx.globalAlpha = 0.4;
      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      ctx.globalAlpha = 1.0;

      // Draw all saved lines
      ctx.shadowColor = '#F5D061';
      ctx.shadowBlur = 15;
      ctx.strokeStyle = '#F5D061';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      lines.forEach(path => {
        if (path.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(path[0].x, path[0].y);
        for (let i = 1; i < path.length; i++) {
          ctx.lineTo(path[i].x, path[i].y);
        }
        ctx.stroke();
      });

      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const landmarks = res.multiHandLandmarks[0];
        
        // Index finger tip (Point 8)
        const indexTip = landmarks[8];
        const targetX = indexTip.x * c.width;
        const targetY = indexTip.y * c.height;

        // Interpolation for smoothness
        if (smoothX === null) {
          smoothX = targetX;
          smoothY = targetY;
        } else {
          smoothX += (targetX - smoothX) * 0.35;
          smoothY += (targetY - smoothY) * 0.35;
        }

        // Pointer dot
        ctx.fillStyle = isShiftPressed ? '#FFFFFF' : 'rgba(245, 208, 97, 0.5)';
        ctx.beginPath();
        ctx.arc(smoothX, smoothY, 8, 0, Math.PI * 2);
        ctx.fill();

        // Drawing Logic
        if (isShiftPressed) {
          if (!isDrawing) {
            isDrawing = true;
            currentPath = [];
            lines.push(currentPath);
          }
          currentPath.push({x: smoothX, y: smoothY});
        } else {
          isDrawing = false;
        }
      } else {
        isDrawing = false;
        smoothX = null;
      }
      ctx.restore();
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const camera = new Camera(vid, {
      onFrame: async () => {
        await hands.send({image: vid});
      },
      width: 1280,
      height: 720
    });

    startBtn.addEventListener('click', () => {
      camera.start();
      document.getElementById('ui').style.background = "rgba(0,0,0,0.2)";
      startBtn.style.display = "none";
    });
  </script>
</body>
</html>
