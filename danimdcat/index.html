<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        #chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; height: 300px; border-bottom: 1px solid #ddd; }
        .message { margin-bottom: 10px; }
        .user { text-align: right; color: blue; }
        .bot { text-align: left; color: green; }
        #input-area { display: flex; padding: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Ask me something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>
</body>
<script>
    const API_KEY = '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'; // Replace with a fresh key

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const messageText = input.value.trim();
        if (!messageText) return;

        appendMessage('user', messageText);
        input.value = '';

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [
                        { role: "system", content: "You are a helpful assistant for my website." }, // Update this later with your web info
                        { role: "user", content: messageText }
                    ]
                })
            });

            const data = await response.json();
            const botMessage = data.choices[0].message.content;
            appendMessage('bot', botMessage);
        } catch (error) {
            appendMessage('bot', "Error: Could not connect to the chatbot.");
            console.error(error);
        }
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
</script>
</html>
