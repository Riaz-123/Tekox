<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Noor Scribble | Premium Air-Writer</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --gold: #F5D061;
      --neon-blue: #00f3ff;
      --rose: #ff007a;
      --bg: #0a0a0c;
    }
    body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
    video { display: none; }
    canvas { width: 100vw; height: 100vh; transform: scaleX(-1); position: absolute; top:0; left:0; }

    /* Modern UI Overlay */
    #dashboard {
      position: absolute; top: 20px; left: 20px; z-index: 100;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px; border-radius: 20px; width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    h1 { color: var(--gold); margin: 0 0 15px 0; font-size: 22px; letter-spacing: 1px; text-align: center; }
    
    .status-badge {
      display: block; text-align: center; padding: 5px; border-radius: 50px;
      font-size: 12px; font-weight: bold; margin-bottom: 15px; border: 1px solid;
    }
    .status-idle { border-color: #555; color: #888; }
    .status-drawing { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px var(--gold); }

    .control-group { margin-bottom: 15px; }
    label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; }
    
    .color-picker { display: flex; gap: 10px; }
    .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
    .dot.active { border-color: white; transform: scale(1.2); }

    .btn {
      width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .btn-primary { background: var(--gold); color: black; }
    .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
    .btn:hover { opacity: 0.8; transform: translateY(-2px); }

    #startOverlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div id="startOverlay">
    <h1 style="font-size: 48px;">NOOR SCRIBRE</h1>
    <p style="color: #666; margin-bottom: 30px;">Professional Air-Gesture Writing Tool</p>
    <button class="btn btn-primary" id="initBtn" style="width: 200px;">Launch Camera</button>
  </div>

  <div id="dashboard">
    <h1>NOOR 🌙</h1>
    <div id="status" class="status-badge status-idle">WAITING FOR HAND...</div>
    
    <div class="control-group">
      <label>BRUSH COLOR</label>
      <div class="color-picker">
        <div class="dot active" style="background: var(--gold);" onclick="changeColor('#F5D061', this)"></div>
        <div class="dot" style="background: var(--neon-blue);" onclick="changeColor('#00f3ff', this)"></div>
        <div class="dot" style="background: var(--rose);" onclick="changeColor('#ff007a', this)"></div>
      </div>
    </div>

    <div class="control-group">
      <label>LINE THICKNESS</label>
      <input type="range" id="thickRange" min="2" max="20" value="6" style="width:100%">
    </div>

    <button class="btn btn-outline" onclick="clearCanvas()">Clear Screen (Space)</button>
    <button class="btn btn-primary" onclick="takeSnapshot()">Save Masterpiece</button>
    <p style="font-size: 10px; color: #666; margin-top: 15px; text-align: center;">Hold <b>SHIFT</b> to write</p>
  </div>

  <video id="vid"></video>
  <canvas id="c"></canvas>

  <script>
    const vid = document.getElementById('vid');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const statusBox = document.getElementById('status');
    const thickRange = document.getElementById('thickRange');

    let lines = []; 
    let currentPath = [];
    let isShiftPressed = false;
    let isDrawing = false;
    let smoothX = null; let smoothY = null;
    let activeColor = '#F5D061';

    function changeColor(clr, el) {
      activeColor = clr;
      document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }

    function clearCanvas() { lines = []; }

    function takeSnapshot() {
      const link = document.createElement('a');
      link.download = 'my-noor-art.png';
      link.href = c.toDataURL();
      link.click();
    }

    window.addEventListener('keydown', (e) => { if (e.key === 'Shift') isShiftPressed = true; if (e.code === 'Space') clearCanvas(); });
    window.addEventListener('keyup', (e) => { if (e.key === 'Shift') isShiftPressed = false; });

    function onResults(res) {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      ctx.save();
      ctx.translate(c.width, 0);
      ctx.scale(-1, 1);

      // Background Video with Overlay
      ctx.globalAlpha = 0.3;
      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      ctx.globalAlpha = 1.0;
      
      // Draw Grid (Subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      for(let i=0; i<c.width; i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,c.height); ctx.stroke(); }

      // Rendering Lines
      lines.forEach(line => {
        if (line.points.length < 2) return;
        ctx.beginPath();
        ctx.shadowBlur = 15;
        ctx.shadowColor = line.color;
        ctx.strokeStyle = line.color;
        ctx.lineWidth = line.width;
        ctx.lineCap = 'round';
        ctx.moveTo(line.points[0].x, line.points[0].y);
        line.points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();
      });

      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const landmarks = res.multiHandLandmarks[0];
        const tip = landmarks[8];
        const tx = tip.x * c.width;
        const ty = tip.y * c.height;

        if (smoothX === null) { smoothX = tx; smoothY = ty; }
        else { smoothX += (tx - smoothX) * 0.3; smoothY += (ty - smoothY) * 0.3; }

        // Cursor UI
        ctx.fillStyle = isShiftPressed ? 'white' : activeColor;
        ctx.shadowBlur = 20; ctx.shadowColor = activeColor;
        ctx.beginPath();
        ctx.arc(smoothX, smoothY, isShiftPressed ? 10 : 5, 0, Math.PI*2);
        ctx.fill();

        if (isShiftPressed) {
          statusBox.innerText = "DRAWING...";
          statusBox.className = "status-badge status-drawing";
          if (!isDrawing) {
            isDrawing = true;
            currentPath = { color: activeColor, width: thickRange.value, points: [] };
            lines.push(currentPath);
          }
          currentPath.points.push({x: smoothX, y: smoothY});
        } else {
          statusBox.innerText = "HAND DETECTED";
          statusBox.className = "status-badge";
          isDrawing = false;
        }
      } else {
        statusBox.innerText = "NO HAND VISIBLE";
        statusBox.className = "status-badge status-idle";
        isDrawing = false;
        smoothX = null;
      }
      ctx.restore();
    }

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });
    hands.onResults(onResults);

    const camera = new Camera(vid, {
      onFrame: async () => { await hands.send({image: vid}); },
      width: 1280, height: 720
    });

    document.getElementById('initBtn').addEventListener('click', () => {
      camera.start();
      document.getElementById('startOverlay').style.display = 'none';
    });
  </script>
</body>
</html>
