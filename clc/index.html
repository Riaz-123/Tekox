<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nPr vs nCr Visualizer</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #ec4899;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h2 { text-align: center; color: #1e293b; margin-top: 0; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        label { display: block; font-size: 0.875rem; font-weight: 600; color: #475569; }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin-top: 4px;
            box-sizing: border-box;
        }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .card {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .npr-card { background-color: var(--primary); }
        .ncr-card { background-color: var(--secondary); }

        .val { font-size: 1.5rem; font-weight: bold; display: block; }
        .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Visualization Bar */
        .viz-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            padding: 10px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 10px;
        }

        .bar {
            flex: 1;
            transition: height 0.3s ease;
            border-radius: 4px 4px 0 0;
            position: relative;
        }

        .bar-npr { background-color: var(--primary); }
        .bar-ncr { background-color: var(--secondary); }

        .error {
            color: #ef4444;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Permutations vs Combinations</h2>
    
    <div class="input-group">
        <div>
            <label>Total Items (n)</label>
            <input type="number" id="n-input" value="5" min="0" max="20">
        </div>
        <div>
            <label>Items to Pick (r)</label>
            <input type="number" id="r-input" value="3" min="0" max="20">
        </div>
    </div>

    <div id="error-msg" class="error">r cannot be greater than n!</div>

    <div class="viz-container">
        <div id="npr-bar" class="bar bar-npr" style="height: 0%;"></div>
        <div id="ncr-bar" class="bar bar-ncr" style="height: 0%;"></div>
    </div>

    <div class="results">
        <div class="card npr-card">
            <span class="label">nPr</span>
            <span id="npr-val" class="val">0</span>
        </div>
        <div class="card ncr-card">
            <span class="label">nCr</span>
            <span id="ncr-val" class="val">0</span>
        </div>
    </div>
</div>

<script>
    const nInput = document.getElementById('n-input');
    const rInput = document.getElementById('r-input');
    const nprVal = document.getElementById('npr-val');
    const ncrVal = document.getElementById('ncr-val');
    const nprBar = document.getElementById('npr-bar');
    const ncrBar = document.getElementById('ncr-bar');
    const errorMsg = document.getElementById('error-msg');

    function factorial(num) {
        if (num < 0) return 0;
        if (num === 0 || num === 1) return 1;
        let result = 1;
        for (let i = 2; i <= num; i++) result *= i;
        return result;
    }

    function calculate() {
        const n = parseInt(nInput.value) || 0;
        const r = parseInt(rInput.value) || 0;

        if (r > n) {
            errorMsg.style.display = 'block';
            nprVal.innerText = "-";
            ncrVal.innerText = "-";
            nprBar.style.height = "0%";
            ncrBar.style.height = "0%";
            return;
        }

        errorMsg.style.display = 'none';

        // Formulas
        const npr = factorial(n) / factorial(n - r);
        const ncr = npr / factorial(r);

        nprVal.innerText = Math.round(npr).toLocaleString();
        ncrVal.innerText = Math.round(ncr).toLocaleString();

        // Update Visualization (Normalize height relative to max)
        const max = Math.max(npr, ncr, 1);
        nprBar.style.height = (npr / max * 100) + "%";
        ncrBar.style.height = (ncr / max * 100) + "%";
    }

    nInput.addEventListener('input', calculate);
    rInput.addEventListener('input', calculate);

    // Initial calculation
    calculate();
</script>

</body>
</html>
