<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM & CNIC Database | Tekox Pro Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="tekox.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --obsidian: #020617;
            --accent-teal: #2dd4bf;
            --accent-blue: #3b82f6;
            --card-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--obsidian);
            color: #e2e8f0;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(45, 212, 191, 0.15), transparent),
                radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.1), transparent);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .heading-font { font-family: 'Space Grotesk', sans-serif; }

        /* Professional Glassmorphism */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Smart Button Design */
        .btn-smart {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--obsidian);
            font-weight: 700;
        }

        .btn-smart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(45, 212, 191, 0.4);
            filter: brightness(1.1);
        }
        
        .btn-smart:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            filter: grayscale(0.5);
        }

        /* Subtle Animation for BG */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .glow-point {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-teal);
            box-shadow: 0 0 15px 2px var(--accent-teal);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Custom Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent-teal);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Tab Toggle Transitions */
        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            color: var(--obsidian);
            box-shadow: 0 4px 15px rgba(45, 212, 191, 0.25);
        }
        .tab-btn.inactive {
            color: #94a3b8;
        }
        .tab-btn.inactive:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg"></div>

    <!-- Header / Navbar -->
    <header class="fixed top-0 w-full z-50 px-4 pt-4">
        <nav class="max-w-6xl mx-auto glass-panel rounded-2xl px-6 py-3 flex justify-between items-center border-white/10">
            <a href="index.html" class="flex items-center gap-2 group cursor-pointer">
                <div class="w-8 h-8 bg-teal-500 rounded-lg flex items-center justify-center rotate-3 shadow-lg shadow-teal-500/20 group-hover:rotate-6 transition-transform">
                    <i class="fa-solid fa-bolt text-slate-900 text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tighter heading-font text-white">TEKOX<span class="text-teal-400 text-3xl">.</span></span>
            </a>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
                <a href="index.html#ecosystem" class="hover:text-teal-400 transition-colors">Services</a>
                <a href="index.html#about" class="hover:text-teal-400 transition-colors">Developer</a>
                <a href="https://wa.me/923181393964" class="btn-smart px-5 py-2 rounded-xl text-xs">
                    REACH NOW
                </a>
            </div>
        </nav>
    </header>

    <!-- Main Content Application -->
    <main class="flex-grow pt-32 pb-20 px-4 md:px-6 flex items-center justify-center">
        <div class="max-w-3xl w-full">
            
            <!-- Page Headers -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-500/20 to-blue-500/20 border border-teal-500/30 text-teal-400 text-2xl mb-6 shadow-lg shadow-teal-500/10">
                    <i class="fa-solid fa-database"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold heading-font text-white mb-4">
                    SIM & CNIC <span class="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">Database</span>
                </h1>
                <p class="text-slate-400 text-lg">Retrieve ownership verification and network records instantly.</p>
            </div>

            <!-- Main Tool Card -->
            <div class="glass-panel rounded-[32px] p-6 md:p-10 border-white/10 relative overflow-hidden">
                <!-- Decorative Blur -->
                <div class="absolute -top-20 -right-20 w-64 h-64 bg-blue-500/10 blur-[80px] rounded-full pointer-events-none"></div>

                <div class="relative z-10">
                    <!-- Search Type Toggle -->
                    <div class="flex gap-2 p-1.5 bg-slate-900/60 rounded-2xl border border-white/5 mb-8">
                        <button id="btn-phone" class="tab-btn active flex-1 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2" onclick="setSearchType('phone')">
                            <i class="fa-solid fa-phone"></i> Phone Number
                        </button>
                        <button id="btn-cnic" class="tab-btn inactive flex-1 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2" onclick="setSearchType('cnic')">
                            <i class="fa-solid fa-id-card"></i> CNIC Number
                        </button>
                    </div>

                    <!-- Input Section -->
                    <div class="space-y-4 mb-8">
                        <label id="inputLabel" class="block text-sm font-bold text-slate-300 uppercase tracking-wider">
                            <i class="fa-solid fa-phone text-teal-400 mr-2"></i> Enter Phone Number
                        </label>
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="relative flex-grow">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-terminal text-slate-500 text-sm"></i>
                                </div>
                                <input type="text" id="searchInput" 
                                    class="w-full bg-slate-900/50 border border-slate-700 focus:border-teal-400 focus:ring-1 focus:ring-teal-400 text-white rounded-2xl py-4 pl-11 pr-4 outline-none transition-all placeholder-slate-600 font-medium" 
                                    placeholder="e.g., 3001234567" autocomplete="off">
                            </div>
                            <button id="checkBtn" onclick="checkQuery()" class="btn-smart py-4 px-8 rounded-2xl md:w-auto w-full text-sm tracking-wide">
                                INITIALIZE <i class="fa-solid fa-magnifying-glass ml-1 text-xs"></i>
                            </button>
                        </div>
                        
                        <!-- Examples -->
                        <div class="flex items-center gap-3 text-sm text-slate-500 flex-wrap pt-2" id="exampleNumbers">
                            <span class="font-semibold text-slate-400"><i class="fa-solid fa-lightbulb text-teal-400/70 mr-1"></i> Try:</span> 
                            <button onclick="setExample('3001234567')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">3001234567</button>
                            <button onclick="setExample('3012345678')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">3012345678</button>
                            <button onclick="setExample('3023456789')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">3023456789</button>
                        </div>
                    </div>

                    <!-- Loader -->
                    <div id="loader" class="hidden py-10 text-center">
                        <div class="spinner mb-4"></div>
                        <p class="text-teal-400 font-semibold text-sm tracking-widest uppercase animate-pulse">Querying Database...</p>
                    </div>

                    <!-- Results Container -->
                    <div id="result" class="hidden mt-8 border-t border-white/10 pt-8">
                        <!-- Content injected via JS -->
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 border-t border-white/5 mt-auto">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <div class="flex items-center gap-2 justify-center md:justify-start mb-1">
                    <i class="fa-solid fa-bolt text-teal-400 text-[10px]"></i>
                    <span class="text-base font-bold tracking-tighter heading-font text-white uppercase">Tekox Pro</span>
                </div>
                <p class="text-slate-500 text-xs">High-performance web architecture.</p>
            </div>
            <div class="text-center md:text-right">
                <p class="text-teal-400 text-xs font-bold tracking-[0.2em] uppercase mb-1">Developer: Riaz Hussain</p>
                <p class="text-slate-600 text-[10px]">© 2026 ALL RIGHTS RESERVED</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        const API_URL = 'https://famofc.site/api/database.php';
        let currentSearchType = 'phone';

        // Custom Cursor Glow Effect
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const glow = document.createElement('div');
            glow.className = 'glow-point';
            glow.style.left = e.pageX + 'px';
            glow.style.top = e.pageY + 'px';
            document.body.appendChild(glow);
            
            setTimeout(() => {
                glow.style.transition = 'opacity 0.5s ease';
                glow.style.opacity = '0';
                setTimeout(() => glow.remove(), 500);
            }, 50);
        });

        // Tab Switching Logic
        function setSearchType(type) {
            currentSearchType = type;
            
            const btnPhone = document.getElementById('btn-phone');
            const btnCnic = document.getElementById('btn-cnic');
            const inputLabel = document.getElementById('inputLabel');
            const searchInput = document.getElementById('searchInput');
            const exampleDiv = document.getElementById('exampleNumbers');
            
            // Update Active States
            if (type === 'phone') {
                btnPhone.className = 'tab-btn active flex-1 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2';
                btnCnic.className = 'tab-btn inactive flex-1 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2';
                
                inputLabel.innerHTML = '<i class="fa-solid fa-phone text-teal-400 mr-2"></i> Enter Phone Number';
                searchInput.placeholder = 'e.g., 3001234567';
                exampleDiv.innerHTML = `
                    <span class="font-semibold text-slate-400"><i class="fa-solid fa-lightbulb text-teal-400/70 mr-1"></i> Try:</span> 
                    <button onclick="setExample('3001234567')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">3001234567</button>
                    <button onclick="setExample('3012345678')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">3012345678</button>
                    <button onclick="setExample('3023456789')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">3023456789</button>
                `;
            } else {
                btnCnic.className = 'tab-btn active flex-1 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2';
                btnPhone.className = 'tab-btn inactive flex-1 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2';
                
                inputLabel.innerHTML = '<i class="fa-solid fa-id-card text-teal-400 mr-2"></i> Enter CNIC Number';
                searchInput.placeholder = 'e.g., 1234512345671 or 12345-1234567-1';
                exampleDiv.innerHTML = `
                    <span class="font-semibold text-slate-400"><i class="fa-solid fa-lightbulb text-teal-400/70 mr-1"></i> Try:</span> 
                    <button onclick="setExample('1234512345671')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">1234512345671</button>
                    <button onclick="setExample('12345-1234567-1')" class="px-3 py-1 bg-slate-800 hover:bg-teal-500/20 hover:text-teal-400 rounded-lg border border-white/5 transition-colors">12345-1234567-1</button>
                `;
            }
            
            // Clear prior results on tab switch
            document.getElementById('result').classList.add('hidden');
            searchInput.value = '';
            searchInput.focus();
        }

        function setExample(value) {
            document.getElementById('searchInput').value = value;
        }

        // Main Query Function
        async function checkQuery() {
            const searchQuery = document.getElementById('searchInput').value.trim();
            const btn = document.getElementById('checkBtn');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            
            if (!searchQuery) {
                showError('Please enter a valid search parameter to continue.');
                return;
            }

            // UI State change
            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = 'PROCESSING...';

            try {
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(searchQuery)}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    displayResult(data.data);
                } else {
                    showError(data.error || 'No records found in the database.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Protocol Failure: Unable to connect to the external API.');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                btn.innerHTML = 'INITIALIZE <i class="fa-solid fa-magnifying-glass ml-1 text-xs"></i>';
            }
        }

        // Render Results using Tailwind CSS structure
        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            
            if (!data.records || data.records.length === 0) {
                showError('No records found for the provided query.');
                return;
            }

            const searchTypeText = data.search_type === 'phone' ? 'Phone Data' : 'CNIC Data';
            const searchValue = data.search_type === 'phone' ? data.queried_number : data.queried_cnic;
            const recordsCount = data.records_count || data.records.length;

            let html = `
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                    <div>
                        <h3 class="text-xl font-bold text-white heading-font mb-1"><i class="fa-solid fa-server text-teal-400 mr-2"></i> Query Results</h3>
                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-800 border border-slate-700 text-xs font-mono text-slate-300">
                            <span class="text-teal-400">${searchTypeText}:</span> ${searchValue}
                        </div>
                    </div>
                    <div class="px-4 py-2 bg-gradient-to-r from-teal-500/20 to-blue-500/20 border border-teal-500/30 rounded-xl text-teal-400 font-bold text-sm shadow-[0_0_15px_rgba(45,212,191,0.1)]">
                        ${recordsCount} Record${recordsCount > 1 ? 's' : ''} Retrieved
                    </div>
                </div>
                
                <div class="space-y-4">
            `;

            data.records.forEach((record, index) => {
                html += `
                    <div class="bg-slate-900/60 border border-white/5 hover:border-teal-500/30 rounded-2xl p-5 md:p-6 transition-colors group">
                        ${data.records.length > 1 ? `<div class="mb-4 inline-block px-3 py-1 bg-slate-800 rounded-lg text-xs font-bold text-slate-400 tracking-wider">RECORD #${index + 1}</div>` : ''}
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-8">
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1"><i class="fa-regular fa-user mr-1 text-teal-500/70"></i> Full Name</p>
                                <p class="text-white font-medium text-lg">${escapeHtml(record.full_name || 'N/A')}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1"><i class="fa-solid fa-phone-flip mr-1 text-teal-500/70"></i> Phone</p>
                                <p class="text-white font-medium text-lg font-mono">${escapeHtml(record.phone || 'N/A')}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1"><i class="fa-regular fa-address-card mr-1 text-teal-500/70"></i> CNIC</p>
                                <p class="text-white font-medium text-lg font-mono">${escapeHtml(record.cnic || 'N/A')}</p>
                            </div>
                            <div class="md:col-span-2">
                                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1"><i class="fa-solid fa-location-dot mr-1 text-teal-500/70"></i> Address</p>
                                <p class="text-slate-300 font-medium">${escapeHtml(record.address || 'N/A')}</p>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            resultDiv.innerHTML = html;
            resultDiv.classList.remove('hidden');
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Render Error State
        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="bg-red-500/10 border border-red-500/30 rounded-2xl p-5 flex items-start gap-4 text-red-400">
                    <div class="mt-0.5"><i class="fa-solid fa-triangle-exclamation text-xl"></i></div>
                    <div>
                        <h4 class="font-bold text-red-400 mb-1">Exception Occurred</h4>
                        <p class="text-sm text-red-400/80">${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        // Security Utility
        function escapeHtml(text) {
            if (!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key submission
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkQuery();
            }
        });
    </script>
</body>
</html>
