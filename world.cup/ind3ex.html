            backdrop-filter: blur(12px);

        /* Smart Button Design */
        .btn-smart {

            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--obsidian);
            font-weight: 700;
        }

        .btn-smart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(45, 212, 191, 0.4);
            filter: brightness(1.1);
        }

        /* Background Grid */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .glow-point {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-teal);
            box-shadow: 0 0 15px 2px var(--accent-teal);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Live Ticker Marquee */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
        }
        .marquee-content {
            display: inline-block;
            animation: scrollLeft 25s linear infinite;
        }
        @keyframes scrollLeft {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Video Player Specifics */
        .video-glow-border {
            background: linear-gradient(45deg, var(--accent-teal), var(--accent-blue), var(--accent-teal));
            background-size: 200%;
            animation: glowingBorder 4s linear infinite;
        }
        @keyframes glowingBorder {
            0% { background-position: 0 0; }
            50% { background-position: 100% 0; }
            100% { background-position: 0 0; }
        }

        /* Custom Play Button States */
        #playBtn { display: none; }
        .paused #playBtn { display: flex; }
        video { outline: none; }
    </style>

    <!-- Scripts -->
    <script>
        // Custom Cursor Glow Effect
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const glow = document.createElement('div');
            glow.className = 'glow-point';
            glow.style.left = e.pageX + 'px';
            glow.style.top = e.pageY + 'px';
            document.body.appendChild(glow);
            
            setTimeout(() => {
                glow.style.transition = 'opacity 0.5s ease';
                glow.style.opacity = '0';
                setTimeout(() => glow.remove(), 500);
            }, 50);
        });

        // Video Player Logic
        document.addEventListener('DOMContentLoaded', function() {
            var video = document.getElementById('video');
            var playBtn = document.getElementById('playBtn');
            var playerWrapper = document.getElementById('playerWrapper');

            // Source URL
            var videoSrc = "https://tencentcdn5.tamashaweb.com/v1/0196159eeff41eb4611d121c76c781/0196159f51bb1ea5064913eb2a83ea/TMSHU1WEB_360p.m3u8";
            
            // Initialize HLS
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Fallback for native Safari support
                video.src = videoSrc;
            }

            // Manual play handling via custom button
            playBtn.addEventListener('click', function () {
                video.play();
            });

            // Handle UI state based on video playback
            video.addEventListener('play', function () {
                playerWrapper.classList.remove('paused');
            });

            video.addEventListener('pause', function () {
                playerWrapper.classList.add('paused');
            });
            
            video.addEventListener('ended', function () {
                playerWrapper.classList.add('paused');
            });
        });
    </script>
