<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casio fx-991ES PLUS Emulator</title>
    <style>
        :root {
            --calc-bg: #c9ccd3;
            --screen-bg: #8ba28f;
            --btn-dark: #2a2a2a;
            --btn-gray: #5c5f66;
            --btn-white: #e8e8e8;
            --btn-del-ac: #ff6b6b;
            --btn-shift: #ffd700;
            --btn-alpha: #ff4d4d;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }

        .calculator {
            background: linear-gradient(to bottom, #d4d8e1, #a4a7ae);
            padding: 25px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.8);
            width: 320px;
            border: 2px solid #888;
        }

        .brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            font-style: italic;
            font-size: 14px;
            color: #333;
        }

        .model {
            font-size: 12px;
            font-weight: normal;
        }

        .screen-container {
            background: #4a4a4a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .screen {
            background-color: var(--screen-bg);
            height: 70px;
            border-radius: 5px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .screen-history {
            font-size: 14px;
            color: #222;
            min-height: 16px;
        }

        .screen-input {
            font-size: 24px;
            color: #000;
            font-weight: bold;
        }

        /* Button Grids */
        button {
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            font-size: 12px;
            padding: 8px 0;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 rgba(0,0,0,0.3);
        }

        .top-functions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .nav-pad {
            grid-column: 3 / 4;
            grid-row: 1 / 3;
            background: var(--btn-dark);
            border-radius: 50%;
            height: 60px;
            width: 60px;
            position: relative;
            margin: -5px auto 0;
        }

        .btn-shift { background-color: var(--btn-shift); color: #000; }
        .btn-alpha { background-color: var(--btn-alpha); color: #fff; }
        .btn-mode { background-color: var(--btn-dark); color: #fff; }
        .btn-on { background-color: var(--btn-dark); color: #fff; }
        
        .sci-functions {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-sci {
            background-color: var(--btn-dark);
            color: #fff;
            border-radius: 8px;
            padding: 6px 0;
            font-size: 11px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .btn-num { background-color: var(--btn-white); color: #000; font-size: 16px; }
        .btn-op { background-color: var(--btn-white); color: #000; font-size: 16px; }
        .btn-del, .btn-ac { background-color: var(--btn-del-ac); color: #fff; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand">
        <span>CASIO</span>
        <span class="model">fx-991ES PLUS</span>
    </div>

    <div class="screen-container">
        <div class="screen">
            <div class="screen-history" id="history"></div>
            <div class="screen-input" id="display">0</div>
        </div>
    </div>

    <div class="top-functions">
        <button class="btn-shift" onclick="insert('SHIFT')">SHIFT</button>
        <button class="btn-alpha" onclick="insert('ALPHA')">ALPHA</button>
        <div class="nav-pad"></div> <button class="btn-mode" onclick="insert('MODE')">MODE</button>
        <button class="btn-on" onclick="clearAll()">ON</button>
    </div>

    <div class="sci-functions">
        <button class="btn-sci" onclick="insert('calc')">CALC</button>
        <button class="btn-sci" onclick="insert('∫(')">∫</button>
        <button class="btn-sci" onclick="insert('^-1')">x⁻¹</button>
        <button class="btn-sci" onclick="insert('log(')">log</button>
        <button class="btn-sci" onclick="insert('frac')">■/□</button>
        <button class="btn-sci" onclick="insert('√(')">√</button>
        
        <button class="btn-sci" onclick="insert('^2')">x²</button>
        <button class="btn-sci" onclick="insert('^')">x^■</button>
        <button class="btn-sci" onclick="insert('ln(')">ln</button>
        <button class="btn-sci" onclick="insert('sin(')">sin</button>
        <button class="btn-sci" onclick="insert('cos(')">cos</button>
        <button class="btn-sci" onclick="insert('tan(')">tan</button>

        <button class="btn-sci" onclick="insert('(-)')">(-)</button>
        <button class="btn-sci" onclick="insert('°\'&quot;')">°'\"</button>
        <button class="btn-sci" onclick="insert('hyp')">hyp</button>
        <button class="btn-sci" onclick="insert('(')">(</button>
        <button class="btn-sci" onclick="insert(')')">)</button>
        <button class="btn-sci" onclick="insert('S<=>D')">S⇔D</button>
    </div>

    <div class="numpad">
        <button class="btn-num" onclick="insert('7')">7</button>
        <button class="btn-num" onclick="insert('8')">8</button>
        <button class="btn-num" onclick="insert('9')">9</button>
        <button class="btn-del" onclick="deleteLast()">DEL</button>
        <button class="btn-ac" onclick="clearAll()">AC</button>

        <button class="btn-num" onclick="insert('4')">4</button>
        <button class="btn-num" onclick="insert('5')">5</button>
        <button class="btn-num" onclick="insert('6')">6</button>
        <button class="btn-op" onclick="insert('*')">×</button>
        <button class="btn-op" onclick="insert('/')">÷</button>

        <button class="btn-num" onclick="insert('1')">1</button>
        <button class="btn-num" onclick="insert('2')">2</button>
        <button class="btn-num" onclick="insert('3')">3</button>
        <button class="btn-op" onclick="insert('+')">+</button>
        <button class="btn-op" onclick="insert('-')">-</button>

        <button class="btn-num" onclick="insert('0')">0</button>
        <button class="btn-num" onclick="insert('.')">.</button>
        <button class="btn-num" onclick="insert('*10^')">x10ˣ</button>
        <button class="btn-num" onclick="insert('Ans')">Ans</button>
        <button class="btn-num" onclick="calculate()" style="background: #e8e8e8;">=</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    let history = document.getElementById('history');
    let isCalculated = false;

    // Insert text into the screen
    function insert(value) {
        if (isCalculated && !isNaN(value)) {
            display.innerText = value;
            isCalculated = false;
        } else {
            if (display.innerText === '0') {
                display.innerText = value;
            } else {
                display.innerText += value;
            }
        }
    }

    // Clear everything (AC/ON)
    function clearAll() {
        display.innerText = '0';
        history.innerText = '';
        isCalculated = false;
    }

    // Backspace (DEL)
    function deleteLast() {
        if (display.innerText.length > 1) {
            display.innerText = display.innerText.slice(0, -1);
        } else {
            display.innerText = '0';
        }
    }

    // Calculate engine
    function calculate() {
        let expression = display.innerText;
        history.innerText = expression + '=';

        try {
            // Replace visual operators with JS operators
            let parseableMath = expression
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/\^/g, '**');

            // Handle basic scientific functions (sin, cos, tan, log, ln, sqrt)
            // Note: A true fx-991ES plus parses trig functions in Degrees or Rads based on mode. 
            // This is a basic implementation using native JS Math (which is in radians).
            parseableMath = parseableMath.replace(/sin\(/g, 'Math.sin(');
            parseableMath = parseableMath.replace(/cos\(/g, 'Math.cos(');
            parseableMath = parseableMath.replace(/tan\(/g, 'Math.tan(');
            parseableMath = parseableMath.replace(/log\(/g, 'Math.log10(');
            parseableMath = parseableMath.replace(/ln\(/g, 'Math.log(');
            parseableMath = parseableMath.replace(/√\(/g, 'Math.sqrt(');

            // Execute math
            let result = eval(parseableMath);

            // Handle JS precision quirks (e.g., 0.1 + 0.2)
            result = Math.round(result * 1e12) / 1e12; 

            display.innerText = result;
            isCalculated = true;
        } catch (error) {
            display.innerText = "Syntax ERROR";
            isCalculated = true;
        }
    }
</script>

</body>
</html>
