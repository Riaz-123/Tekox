<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Studio | Riaz Hussain</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --dark-bg: #0f172a;
            --text-light: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 8px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        select, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        select:focus, textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        textarea {
            resize: none;
            min-height: 100px;
        }

        .btn-generate {
            width: 100%;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.5);
        }

        .btn-generate:active { transform: translateY(0); }

        /* Audio Player Styling */
        .audio-player {
            margin-top: 25px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            display: none;
        }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        #result {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Developer Section */
        .dev-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .dev-name {
            font-weight: 600;
            color: #f8fafc;
            display: block;
            margin-bottom: 15px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .wa-chat { background: #25d366; color: white; }
        .wa-channel { background: #0088cc; color: white; }

        .social-btn:hover { opacity: 0.9; transform: scale(1.05); }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Voice Studio</h1>
        <p class="subtitle">Convert text to professional AI speech</p>

        <div class="input-group">
            <label><i class="fa-solid fa-microphone-lines"></i> Select Voice Model</label>
            <select id="voice">
                <option value="ansel">Ansel</option><option value="autumn">Autumn</option>
                <option value="bella">Bella</option><option value="brandon">Brandon</option>
                <option value="cassian">Cassian</option><option value="elowen">Elowen</option>
                <option value="evander">Evander</option><option value="huxley">Huxley</option>
                <option value="jacob">Jacob</option><option value="juniper">Juniper</option>
                <option value="kennedy">Kennedy</option><option value="lucas">Lucas</option>
                <option value="morgan">Morgan</option><option value="natalie">Natalie</option>
                <option value="nyssa">Nyssa</option><option value="ryan">Ryan</option>
                <option value="sadie">Sadie</option><option value="stella">Stella</option>
                <option value="tyler">Tyler</option><option value="vesper">Vesper</option>
                <option value="violet">Violet</option><option value="warrick">Warrick</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fa-solid fa-keyboard"></i> Your Message</label>
            <textarea id="text" placeholder="Type what you want the AI to say...">Hello, I am your high-quality AI voice assistant. How can I help you today?</textarea>
        </div>

        <button class="btn-generate" onclick="generateSpeech()">
            <span id="btnText">Generate Speech</span>
            <div class="loader" id="loader"></div>
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </button>

        <div class="audio-player" id="audioPlayer">
            <audio id="audio" controls></audio>
        </div>

        <div id="result"></div>

        <div class="dev-info">
            <span class="dev-name">Developed by Riaz Hussain</span>
            <div class="social-links">
                <a href="https://wa.me/923181393964" class="social-btn wa-chat" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i> Chat
                </a>
                <a href="https://whatsapp.com/channel/0029Vaghq2Q2ER6qcRhijo0S" class="social-btn wa-channel" target="_blank">
                    <i class="fa-solid fa-tower-broadcast"></i> Channel
                </a>
            </div>
        </div>
    </div>

    <script>
        async function generateSpeech() {
            const voice = document.getElementById('voice').value;
            const text = document.getElementById('text').value;
            const resultDiv = document.getElementById('result');
            const audioPlayer = document.getElementById('audioPlayer');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            
            if (!text) {
                resultDiv.innerHTML = '<p style="color:#fb7185"><i class="fa-solid fa-circle-exclamation"></i> Please enter some text</p>';
                return;
            }
            
            // UI State: Loading
            loader.style.display = 'inline-block';
            btnText.innerText = 'Processing...';
            resultDiv.innerHTML = '';
            audioPlayer.style.display = 'none';
            
            try {
                const response = await fetch(`https://famofc.site/api/tts.php?voice=${voice}&text=${encodeURIComponent(text)}`);
                
                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = document.getElementById('audio');
                    audio.src = audioUrl;
                    
                    audioPlayer.style.display = 'block';
                    audio.play();
                    resultDiv.innerHTML = '<p style="color:#4ade80"><i class="fa-solid fa-circle-check"></i> Voice generated successfully!</p>';
                } else {
                    const error = await response.json();
                    resultDiv.innerHTML = `<p style="color:#fb7185">Error: ${error.error || 'Connection failed'}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:#fb7185">Error: ${error.message}</p>`;
            } finally {
                loader.style.display = 'none';
                btnText.innerText = 'Generate Speech';
            }
        }
    </script>
</body>
</html>
